name: shein_manager
description: "تطبيق إدارة طلبات SHEIN لمندوب المبيعات - Shein Sales Order Manager"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database (Drift = SQLite type-safe ORM)
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI / UX
  google_fonts: ^6.2.1
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  intl: ^0.19.0

  # Navigation
  go_router: ^14.2.0

  # Export / Backup
  pdf: ^3.11.0
  printing: ^5.12.0
  excel: ^4.0.3
  share_plus: ^9.0.0
  file_picker: ^8.0.3

  # Utils
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.16.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/fonts/
