workflows:
  default-workflow:
    name: Shein Manager
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Regenerate missing platform folders
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android .
          fi
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build APK
        script: |
          flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
